{%extends 'base.html'%}   
{%block context%}
    <br>
    <br>
    <br>
    <div class="container-fluid d-flex justify-content-center align-items-center mt-5 text-white" >
        <div class="card bg-dark" style="width: 30rem; color: #ccc;">
            <div class="card-body">
                <h3 class="card-title">Log In</h3>
                <form method="POST">
            <div class="form-group">
                <label for="email"  class="form-control-label">Email</label>
                <input type="email" autocomplete="email" id="email" name="email" class="form-control" required>
            </div>
            <br>
            <div class="form-group">
                <label for="password" class="form-control-label">Password</label>
                <input type="password" autocomplete="current-password" id="password" name="password" class="form-control" required>
            </div>
            <br>
            <div class="form-group">
                <button type="submit" class="btn btn-primary btn-light" style="width: 100%;">Log In</button>
            </div>
            {%if error%}
                <div style="color: #ff000f;">
                    {{ error }}
                </div>
            {% endif %}
          </form>
    
            </div>
        </div>
    </div>
<p style="text-align: center;">Dont have an account? Create one <a href="/signup">Here</a> !</p>

    </div>
    {%endblock%}
