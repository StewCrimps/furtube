<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Furtube {{ title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="darkreader-lock"> <!-- Disable Dark Reader Extension Fromm Being Enabled  -->
    <link rel="icon" type="image/x-icon" href="/static/images/orange_fav_logo.png">

    <!-- Bootstrap 5 CSS (only one version) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <!-- Font Awesome -->
    <link href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">

    <style>
        /* ── Layout ── */
body {
    color: #f3f3f3;
    background: #101010;
    padding-top: 56px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}
.center-row {
  display: flex;
  justify-content: center;
  width: 100%;
}

.center-row .row {
  width: 100%;
  max-width: 1400px; /* optional: cap how wide the grid gets on huge screens */
  margin: 0;
}
/* ── Navbar ── */
.nav-black {
    background-color: #0d0c0c;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.0);
}
.dropdown-menu .dropdown-item:hover {
    background-color: #1a1a1a;
    color: #ffffff;
}

/* ── Search bar ── */
.form-control {
    padding-right: 3rem;
    outline: none;
    box-shadow: none;
}

.form-control:focus {
    outline: none;
    box-shadow: none;
}

/* ── Offcanvas ── */
.offcanvas {
    background: #101010;
    color: #f3f3f3;
    box-shadow: none;
}

/* ── Accordion ── */
.accordion-item {
    background: #101010;
    color: #f3f3f3;
    border-color: transparent;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
}

.accordion-button {
    background: #101010;
    color: #f3f3f3;
    box-shadow: none;
    outline: none;
}

.accordion-button::after {
    filter: invert(1);
}

.accordion-button:not(.collapsed) {
    background: #1a1a1a;
    color: #f3f3f3;
    box-shadow: none;
    outline: none;
}

.accordion-button:focus {
    outline: none;
    box-shadow: none;
}

.accordion-body {
    background: #101010;
    color: #f3f3f3;
}

.offcanvas-header {
    justify-content: flex-start !important;
    gap: 8px;
    padding-left: 8px;
}

.card-text {
    background: #101010;
    color: #f3f3f3;
}

/* ── Card ── */
.card {
    background: #101010;
    color: #f3f3f3;
    border-color: transparent;
    box-shadow: none;
}

.card-header,
.card-footer {
    background: #1a1a1a;
    color: #f3f3f3;
    border-color: transparent;
}

.modal-content {
    background: #1a1a1a;
    color: #f3f3f3;
    border-color: transparent;
}

.card-body {
    background: #101010;
    color: #f3f3f3;
}

/* ── Profile image card ── */
.image-container {
    position: relative;
    display: inline-block;
}

.image-container .text {
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
}

.image-container img {
    height: 250px;
    width: 200px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    transition: transform 0.3s ease;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.6);
}

.image-container img:hover {
    transform: scale(1.1);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.7);
}
.btn-black {
  color: #f3f3f3;
  box-shadow: none;
  border-color: transparent;
}
/* ── Utility ── */
.bg-outline {
    border: none;
    border-radius: 8px;
    padding: 10px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
}

.admin-buttons {
    border: none;
    box-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
}

[data-bs-toggle="tab"][aria-selected="true"] {
  background-color: var(--bs-light);
  border-color: var(--bs-light);
  color: #000000;
}
[data-bs-toggle="tab"][aria-selected="false"] {
  background-color: var(--bs-dark);
  border-color: var(--bs-dark);
  color: #ffffff;
}
/* Remove on both states */
.accordion-button::after,
.accordion-button:not(.collapsed)::after {
  display: none;
}
/* Video Container Styles */
.video-wrap {
  aspect-ratio: 16 / 9;      /* match your actual video's ratio */
  width: 100%;
  border-radius: 8px;
  overflow: hidden;
}

.video-wrap video {
  width: 100%;
  height: 100%;
  object-fit: contain;      /* or cover, depending on look you want */
  border-radius: 8px;
}
.big-video {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px 16px;
  padding: 24px 0;
}
#search::placeholder {
  color: #cccccc;
  opacity: 1;
}

    </style>

</head>

<body>

    <!-- ── Navbar ── -->
    <nav class="navbar nav-black fixed-top" style="background-color: black;">
  <div class="container-fluid d-flex align-items-center" style="gap: 12px;">

    <!-- Left: burger + logo (always visible, never collapses) -->
    <div class="d-flex align-items-center gap-2 flex-shrink-0">
      <button class="btn  navbar-toggler-icon" type="button" style="filter: invert(1); box-shadow: none !important;" data-bs-toggle="offcanvas" data-bs-target="#offcanvasExample" aria-label="Toggle navigation" aria-controls="offcanvasExample"></button>
      <a class="navbar-brand mb-0" style="color: rgb(0, 0, 0);" href="/"><img src="/static/images/orange_main_full_logo.png" style="height: 30px;" alt="Furtube Logo"></a>
      
    </div>

    <!-- Center: search (absolutely centered) -->
    <form class="d-flex position-absolute start-50 translate-middle-x" role="search" style="width: clamp(120px, 30vw, 350px); flex-shrink: 1;">
      <input class="form-control pe-5 rounded-pill" id="search" type="search" placeholder="Search" aria-label="Search" style="width: 100%; background-color: #202020; border-color: rgba(0, 0, 0, 1); color: #ffffff;">
    </form>

    <!-- Right: avatar (pushed to far right with ms-auto) -->

    
    <div class="dropdown ms-auto flex-shrink-0">
    {% if current_user == None %}
      <a class="dropdown-item text-white" href="/login/">Login</a>
    {%else%}
      <a class="nav-link dropdown-toggle p-0"
         href="#"
         id="navbarDropdown"
         role="button"
         data-bs-toggle="dropdown"
         aria-expanded="false">
        <img src="/static/images/template_pfp.png" style="height: 40px; width: 40; margin-right: 10px;" class="rounded-circle" alt="Channel" onerror="this.style.display='none'">
      </a>
      <ul class="dropdown-menu dropdown-menu-end"
          style="background-color: #000000;"
          aria-labelledby="navbarDropdown">
        <li><a class="dropdown-item text-white" href="/channel/">Channel</a></li>
        <li><a class="dropdown-item text-white" href="/settings/">Settings</a></li>
        <li><hr class="dropdown-divider border-dark"></li>
        <li><a class="dropdown-item text-white" href="/logout">Log Out</a></li>
      </ul>
    {%endif%}
    </div>
    

  </div>
</nav>
<!-- Nav end -->
  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasExample" style="width: 300px;" aria-labelledby="offcanvasExampleLabel">
<div class="offcanvas-header">
  <a class="navbar-brand" href="/">
        <img src="/static/images/orange_main_full_logo.png" style="height: 30px;" alt="Furtube">
    </a>
    <button type="button" class="btn-close btn-close-black" data-bs-dismiss="offcanvas" style="filter: invert(1); box-shadow: none !important;" aria-label="Close"></button>
    
</div>
  <div class="offcanvas-body ">
    <!-- Home -->
    <a class="navbar-brand" href="/">
    <button type="button" class="btn btn-black" style="width: 100%; display: flex; align-items: center;">
      <img src="/static/images/new_home.png" style="height: 30px; margin-right: 8px;" alt="Home Image">
      <span style="flex: 1; text-align: left;">Home</span>
    </button>
    </a>
    <hr>
    {% if current_user != None %}
    <a class="navbar-brand" href="/subscriptions/">
    <h2>Subscribtions →</h2>
    </a>
    <a class="navbar-brand" href="/channel/@User1">
    <button type="button" class="btn btn-black" style="width: 100%; display: flex; align-items: center;">
      <img src="/static/images/new_profile.png" style="height: 30px; margin-right: 8px;" alt="User 1">
      <span style="flex: 1; text-align: left;">User1</span>
    </button>
    </a>
    <a class="navbar-brand" href="/channel/@User2">
    <button type="button" class="btn btn-black" style="width: 100%; display: flex; align-items: center;">
      <img src="/static/images/new_profile.png" style="height: 30px; margin-right: 8px;" alt="User 2">
      <span style="flex: 1; text-align: left;">User2</span>
    </button>
    </a>
    <a class="navbar-brand" href="/channel/@User3">
    <button type="button" class="btn btn-black" style="width: 100%; display: flex; align-items: center;">
      <img src="/static/images/new_profile.png" style="height: 30px; margin-right: 8px;" alt="User 3">
      <span style="flex: 1; text-align: left;">User3</span>
    </button>
    </a>
     <hr>
    
    <a class="navbar-brand" href="/channel/">
      <h2>You →</h2>
    </a>
    <!-- 1 -->
    <a class="navbar-brand" href="/history/">
    <button type="button" class="btn btn-black" style="width: 100%; display: flex; align-items: center;">
      <img src="/static/images/new_history.png" style="height: 30px; margin-right: 8px;" alt="History">
      <span style="flex: 1; text-align: left;">History</span>
    </button>
    </a>
    <!-- 2 -->
    <a class="navbar-brand" href="/playlist/">
    <button type="button" class="btn btn-black" style="width: 100%; display: flex; align-items: center;">
      <img src="/static/images/new_playlist.png" style="height: 30px; margin-right: 8px;" alt="Playlists">
      <span style="flex: 1; text-align: left;">Playlists</span>
    </button>
    </a>
    <!-- 3 -->
    <a class="navbar-brand" href="/your-videos/">
    <button type="button" class="btn btn-black" style="width: 100%; display: flex; align-items: center;">
      <img src="/static/images/new_your_videos.png" style="height: 30px; margin-right: 8px;" alt="Playlists">
      <span style="flex: 1; text-align: left;">Your Videos</span>
    </button>
    </a>
    <hr>
    
    {%endif%}

    <h2>Explore</h2>
    <!-- 1 -->
    <a class="navbar-brand" href="/watch/">
    <button type="button" class="btn btn-black" style="width: 100%; display: flex; align-items: center;">
      <img src="/static/images/new_random.png" style="height: 30px; margin-right: 8px;" alt="Random">
      <span style="flex: 1; text-align: left;">Random Video</span>
    </button>
    </a>
    <!-- 2 -->
    <a class="navbar-brand" href="/music/">
    <button type="button" class="btn btn-black" style="width: 100%; display: flex; align-items: center;">
      <img src="/static/images/new_music.png" style="height: 30px; margin-right: 8px;" alt="Music">
      <span style="flex: 1; text-align: left;">Music</span>
    </button>
    </a>
    <hr>
    <a class="navbar-brand" href="/watch/">
    <button type="button" class="btn btn-black" style="width: 100%; display: flex; align-items: center;">
      <img src="/static/images/play.png" style="height: 30px; margin-right: 8px;" alt="Watch Page">
      <span style="flex: 1; text-align: left;">Watch</span>
    </button>
    </a>
    <div class="flex-grow-1">
      <br>
    </div>
    <br>
    <footer class="py-4 bg-black">
        <div class="container">
            <p class="m-0 text-center text-white">Copyright &copy; StewCrimps 2026</p>
        </div>
    </footer>
  </div>
</div>






    <!-- ── Page content ── -->
    <main class="flex-grow-1">
        {% block context %}
        {% endblock %}
    </main>

    <!-- ── Footer ── -->
    <!-- flex-grow-1 on <main> pushes the footer to the bottom on short pages;
         on long pages it simply flows after the content as normal. -->
    <footer class="py-4 bg-black">
        <div class="container">
            <p class="m-0 text-center text-white">Copyright &copy; StewCrimps 2026</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS bundle (includes Popper — required for dropdowns & navbar toggler) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>

</body>
</html>
