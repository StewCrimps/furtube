{%extends 'base.html'%}
{%block context%}
<br>


<h2 style="padding-left: 30px;">Editor</h2>
<div class="center-row">
    <div>
        
    </div>

    
</div>










<div class="container-fluid d-flex justify-content-center align-items-center mt-5 text-light" style="min-height: 59vh;">
    <div class="card bg-dark" style="width: 30rem; color: #ccc;">
        <div class="card-body">
            <h3 class="card-title">Upload a video</h3>

            {% if error %}
                <div class="alert alert-danger" role="alert">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="video" class="form-control-label">Video file</label>
                    <input
                        type="file"
                        id="video"
                        name="video"
                        class="form-control"
                        accept=".mp4,.mkv,.mov,.m4p,.m4v"
                        required
                    >
                </div>

                <br>

                <button type="submit" class="btn btn-light" style="width: 100%;">
                    Upload
                </button>
            </form>
        </div>
    </div>
</div>

{%endblock%}
